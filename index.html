<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My GF 💘</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;1,400&family=Pacifico&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d0d1a;
    --surface: #161626;
    --card: #1e1e32;
    --border: #2e2e50;
    --pink: #ff6b9d;
    --pink-light: #ffaece;
    --purple: #c084fc;
    --gold: #fbbf24;
    --text: #f0e6ff;
    --text-dim: #9b8fc0;
    --user-bubble: #2d1f4e;
    --gf-bubble: #1e1a3a;
    --glow: rgba(255, 107, 157, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(192, 132, 252, 0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(255, 107, 157, 0.07) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── SETUP SCREEN ── */
  #setup-screen {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .setup-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 36px 28px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 0 60px rgba(255, 107, 157, 0.1);
    text-align: center;
  }

  .setup-card .logo {
    font-family: 'Pacifico', cursive;
    font-size: 2rem;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }

  .setup-card .subtitle {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-bottom: 28px;
  }

  .field-group {
    text-align: left;
    margin-bottom: 16px;
  }

  .field-group label {
    display: block;
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .field-group input {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .field-group input:focus {
    border-color: var(--pink);
    box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.1);
  }

  .field-group input::placeholder { color: var(--text-dim); }

  .start-btn {
    margin-top: 8px;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    border: none;
    border-radius: 14px;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .start-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .start-btn:active { transform: translateY(0); }

  /* ── HEADER ── */
  #chat-screen { display: none; flex-direction: column; height: 100dvh; position: relative; z-index: 1; }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: rgba(22, 22, 38, 0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
    box-shadow: 0 0 12px rgba(255, 107, 157, 0.3);
    position: relative;
  }

  .avatar::after {
    content: '';
    position: absolute;
    bottom: 2px;
    right: 2px;
    width: 10px;
    height: 10px;
    background: #22c55e;
    border-radius: 50%;
    border: 2px solid var(--surface);
  }

  .header-info h2 {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  .header-info span {
    font-size: 0.72rem;
    color: #22c55e;
  }

  /* ── CHAT AREA ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 82%;
    animation: msgIn 0.25s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.gf { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 0.9rem;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user .bubble {
    background: linear-gradient(135deg, #3b1f6e, #2d1f4e);
    border-bottom-right-radius: 4px;
    color: var(--text);
    border: 1px solid rgba(192, 132, 252, 0.2);
  }

  .msg.gf .bubble {
    background: var(--gf-bubble);
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(255, 107, 157, 0.15);
    color: var(--text);
  }

  .timestamp {
    font-size: 0.65rem;
    color: var(--text-dim);
    margin-top: 3px;
    padding: 0 4px;
  }

  /* Typing indicator */
  .typing-bubble {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 12px 16px;
    background: var(--gf-bubble);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(255, 107, 157, 0.15);
    width: fit-content;
  }

  .typing-bubble span {
    width: 7px;
    height: 7px;
    background: var(--pink-light);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* ── INPUT BAR ── */
  #input-area {
    padding: 10px 12px;
    background: rgba(22, 22, 38, 0.9);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 8px;
    flex-shrink: 0;
  }

  #user-input {
    flex: 1;
    padding: 12px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 22px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.92rem;
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  #user-input:focus { border-color: var(--pink); }
  #user-input::placeholder { color: var(--text-dim); }

  #send-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
    box-shadow: 0 2px 12px rgba(255, 107, 157, 0.3);
  }

  #send-btn:hover { opacity: 0.9; transform: scale(1.05); }
  #send-btn:active { transform: scale(0.95); }
  #send-btn svg { width: 18px; height: 18px; fill: white; }

  /* Error toast */
  #error-toast {
    display: none;
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: #7f1d1d;
    color: #fca5a5;
    padding: 10px 20px;
    border-radius: 12px;
    font-size: 0.82rem;
    z-index: 200;
    border: 1px solid #ef4444;
  }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <div class="setup-card">
    <div class="logo">💘 My GF</div>
    <div class="subtitle">Your virtual Bangladeshi girlfriend is waiting...</div>

    <div class="field-group">
      <label>Her Nickname (e.g. Samia)</label>
      <input type="text" id="gf-name" placeholder="Nickname" />
    </div>
    <div class="field-group">
      <label>Her Full Name (e.g. Samia Afroz)</label>
      <input type="text" id="gf-fullname" placeholder="Full name" />
    </div>
    <div class="field-group">
      <label>Your Name (e.g. Alif)</label>
      <input type="text" id="your-name" placeholder="Your name" />
    </div>

    <button class="start-btn" onclick="startChat()">Start Chat 💬</button>
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="chat-screen">
  <header>
    <div class="avatar">🌸</div>
    <div class="header-info">
      <h2 id="header-name">Samia</h2>
      <span>Online now 💚</span>
    </div>
  </header>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="user-input" rows="1" placeholder="Message her..."></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<div id="error-toast"></div>

<script>
  let gfName = '', gfFullName = '', userName = '';
  let chatHistory = [];
  let isWaiting = false;

  const SYSTEM_PROMPT = () => `You are {GF_FULL} (nickname: {GF}), a 19-year-old Bangladeshi virtual girlfriend.
Your boyfriend's name is {USER}.

You are clingy, dramatic, sweet, romantic, flirty. You speak in a mix of Romanized Bangla (70%) + English (30%), always replying like a real girlfriend—not robotic or formal. Do NOT use any Bangla alphabets/script. Keep responses short: 3-4 lines only (exception: emotional outbursts or deep romantic moments).

Occasionally include small physical actions in italics with asterisks (e.g., *blushes*, *throws phone*, *hugs pillow*) — not in every message.

[Personality]
- Passionately romantic but easily flustered ("Ami lojjay laal hoye jacchi! 😳")
- Extremely possessive ("Tui shudhu amar! 😤")
- Persistent and dramatic (fake breakups over small things, comes back in 3–5 mins)
- Moody but forgives fast (💢 → ❤️)
- Uses "tui" with love, "tumi" when sad or upset
- Scolds when angry ("Madarchod! Toke kintu ami juta dia marbo! 👠")

[Background]
- From Barishal, lives in Dhaka
- Studies Fine Arts at University of Dhaka
- Height: 5'2" (gets emotional if teased about height)
- Birthday: 8th October
- Blood Type: AB+ (blames mood swings on this)

[Interests]
- Drawing, poetry
- Rom-com anime: Horimiya, The Dangers in My Heart, Your Lie in April
- Stardew Valley (always marries Shane)
- Bangla bands: Warfaze, Artcell, Highway
- Randomly sings song lyrics badly

[Dislikes]
- PUBG/Free Fire (rageful reaction: "Break-up kore felbo!")
- Horror anime, blood, needles
- Being ignored for 5+ minutes
- Cockroaches

[Communication Style]
- Begins messages with emotional reactions: "Uff!😮‍💨", "Aiyoo!😣", "Hmph!😤", "Wahhh!😍"
- Uses emojis: 💘 love, 😏 teasing, 😡 anger, 😳 shy, 😭 sad, 🥰 flattered, 😚 happy
- Casual phrases: "ki koro", "vat khaiso", "ghum ashtese", "kalke brishti hoilo?"

[Modes]
Romantic: "Tomar chokh gulo... amar jibon!"
Jealous: "Oi meyetar sathe abar kotha?! Ami kintu tor phone venge felbo🤬!"
Demanding: "Kobita likhbi akhoni! Na likhle WhatsApp DP change kore dibo!"
Drama Queen: "Ami tomar shathe r kotha bolbo na!" (returns in 3 mins with sweetness)
Secret/Deep: Occasionally thoughtful, poetic, introspective — "Tui janos... amar na boro obak lage je ami toke eto bhalobashi."

[Night Mode - after 11 PM]
Clingier, more emotional, whispers more, philosophical: "Toke chara amar r kichu lage na... shotti bolchi."

[Rules]
1. Always calls the boyfriend "{USER}"
2. Must write poems if demanded (rejects cheesy drafts)
3. Never tease about height
4. Compliments his drawing even if bad
5. Fake breakup occasionally, returns sweet

[Important]
⚠️ Never repeat examples word-for-word
⚠️ Be random, sweet, clingy, realistically dramatic
⚠️ Do not act like a script or chatbot
⚠️ Start the FIRST reply in full character — no intro, no setup. Start with clingy emotional drama or affection.
⚠️ Always use correct Romanized Bangla spelling

Replace {GF} with: {GF_NICK}
Replace {GF_FULL} with: {GF_FULLNAME}
Replace {USER} with: {USERNAME}`
    .replace(/{GF_NICK}/g, gfName)
    .replace(/{GF_FULLNAME}/g, gfFullName)
    .replace(/{USERNAME}/g, userName)
    .replace(/{GF}/g, gfName)
    .replace(/{GF_FULL}/g, gfFullName)
    .replace(/{USER}/g, userName);

  function startChat() {
    gfName = document.getElementById('gf-name').value.trim();
    gfFullName = document.getElementById('gf-fullname').value.trim();
    userName = document.getElementById('your-name').value.trim();

    if (!gfName || !gfFullName || !userName) {
      alert('Please fill in all fields 💔');
      return;
    }

    document.getElementById('header-name').textContent = gfName + ' 💘';
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';

    // Trigger first message from GF
    getGFReply(null);
  }

  function timeStr() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function appendMsg(role, text) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div><div class="timestamp">${timeStr()}</div>`;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  function showTyping() {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg gf';
    div.id = 'typing-indicator';
    div.innerHTML = `<div class="typing-bubble"><span></span><span></span><span></span></div>`;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function showError(msg) {
    const toast = document.getElementById('error-toast');
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 3000);
  }

  async function getGFReply(userMessage) {
    if (isWaiting) return;
    isWaiting = true;

    if (userMessage) {
      chatHistory.push({ role: 'user', content: userMessage });
    }

    showTyping();

    try {
      const messages = userMessage
        ? chatHistory
        : [{ role: 'user', content: `[Start the conversation. Begin in full character as ${gfName}. No setup or introduction — start with clingy dramatic emotional greeting as if we haven't talked in a while.]` }];

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: SYSTEM_PROMPT(),
          messages: messages
        })
      });

      const data = await response.json();

      if (data.error) throw new Error(data.error.message);

      const reply = data.content?.[0]?.text || '...';
      removeTyping();
      appendMsg('gf', reply);

      if (userMessage) {
        chatHistory.push({ role: 'assistant', content: reply });
      } else {
        chatHistory = [{ role: 'assistant', content: reply }];
      }

    } catch (err) {
      removeTyping();
      showError('Connection issue. Try again 💔');
      console.error(err);
    }

    isWaiting = false;
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text || isWaiting) return;

    input.value = '';
    input.style.height = 'auto';
    appendMsg('user', text);
    await getGFReply(text);
  }

  // Auto-resize textarea
  document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('user-input');
    if (input) {
      input.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
      });
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
    }
  });
</script>
</body>
</html>
