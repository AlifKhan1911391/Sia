  function renderBubble(role, text, animate = true) {
    const isSent = role === 'user';

    const row = document.createElement('div');
    row.className = `msg-row ${isSent ? 'sent' : 'recv'}`;

    if (!isSent) {
      const av = document.createElement('img');
      av.className = 'msg-avatar';
      av.src = userData.profilePic || 'avatar.svg';
      av.alt = userData.gfname;
      av.onerror = () => { av.src = 'avatar.svg'; };
      row.appendChild(av);

    const wrap = document.createElement('div');

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = now();

    wrap.appendChild(bubble);
    wrap.appendChild(time);
    row.appendChild(wrap);

    if (!animate) row.style.animation = 'none';
    messagesArea.appendChild(row);
    scrollBottom();
    return row;
  }

  let isWaiting = false;

  async function sendToAI(userText, hidden = false) {
    if (isWaiting) return;
    isWaiting = true;
    sendBtn.disabled = true;

    // Add user message to history (skip for hidden trigger)
    if (!hidden) {

      hideTyping();
      history.push({ role: 'model', text: reply });
      renderBubble('model', reply);

      // Persist history (capped at 60 entries)
      if (history.length > 60) history = history.slice(-60);
      localStorage.setItem('siaai_history', JSON.stringify(history));

      hideTyping();
      showToast('⚠️ ' + (err.message || 'Something went wrong'));
      // Remove the failed user message from history if hidden
      if (!hidden && history[history.length - 1]?.role === 'user') {

      }

      isWaiting = false;
      updateSendBtn();
    }

    history = [];
    localStorage.removeItem('siaai_history');
    messagesArea.innerHTML = '';

    const divider = document.createElement('div');
    divider.className = 'date-divider';
    divider.textContent = 'Today';
    messagesArea.appendChild(divider);

    sendToAI('[CONVERSATION_START]', true);
  });

  // ── Helpers ───────────────────────────────────────────────────────────────────
  function updateSendBtn() {
    sendBtn.disabled = !messageInput.value.trim() || isWaiting;
  }

  function scrollBottom() {
    requestAnimationFrame(() => {
      messagesArea.scrollTop = messagesArea.scrollHeight;
    });
  }

  function now() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
  }

  // ── Focus input on load ───────────────────────────────────────────────────────
  window.addEventListener('load', () => {
    setTimeout(() => messageInput.focus(), 300);
  });

  </script>
</body>
</html>
