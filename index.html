<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sia AI — Setup</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Override overflow for index page */
    html, body { overflow: auto; }
  </style>
</head>
<body>
  <div class="index-bg">
    <div class="setup-card">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-icon">💕</div>
        <h1>Sia AI</h1>
        <p>Your virtual companion is waiting…</p>
      </div>

      <!-- Avatar Upload -->
      <div class="avatar-upload">
        <label for="avatarInput" aria-label="Upload girlfriend profile picture">
          <div class="avatar-ring" id="avatarRing">
            <img
              id="avatarPreview"
              class="avatar-preview"
              src="avatar.svg"
              alt="Profile picture"
              onerror="this.src='avatar.svg'"
            />
            <div class="avatar-overlay">📷</div>
          </div>
        </label>
        <input type="file" id="avatarInput" accept="image/*" aria-label="Upload profile image" />
        <span class="avatar-hint">Tap to add her photo</span>
      </div>

      <!-- Form Fields -->
      <div class="fields">
        <div class="field-group">
          <label for="usernameInput">Your Name</label>
          <input
            type="text"
            id="usernameInput"
            placeholder="e.g. Rafid"
            maxlength="30"
            autocomplete="off"
          />
        </div>

        <div class="field-group">
          <label for="gfnameInput">Girlfriend's Nickname</label>
          <input
            type="text"
            id="gfnameInput"
            placeholder="e.g. Mitu"
            maxlength="30"
            autocomplete="off"
          />
        </div>

        <div class="field-group">
          <label for="gfnamefullInput">Girlfriend's Full Name</label>
          <input
            type="text"
            id="gfnamefullInput"
            placeholder="e.g. Mitusha Rahman"
            maxlength="60"
            autocomplete="off"
          />
        </div>
      </div>

      <!-- Start Button -->
      <button class="start-btn" id="startBtn" type="button">
        Let's Chat 💕
      </button>

    </div>
  </div>

  <script>
    // ── Avatar Upload ────────────────────────────────────────────────────────────
    const avatarInput   = document.getElementById('avatarInput');
    const avatarPreview = document.getElementById('avatarPreview');

    avatarInput.addEventListener('change', () => {
      const file = avatarInput.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        avatarPreview.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });

    // ── Restore saved data if exists ─────────────────────────────────────────────
    (() => {
      try {
        const saved = JSON.parse(localStorage.getItem('siaai_user') || 'null');
        if (!saved) return;
        if (saved.username)    document.getElementById('usernameInput').value    = saved.username;
        if (saved.gfname)      document.getElementById('gfnameInput').value      = saved.gfname;
        if (saved.gfnamefull)  document.getElementById('gfnamefullInput').value  = saved.gfnamefull;
        if (saved.profilePic)  avatarPreview.src = saved.profilePic;
      } catch { /* ignore */ }
    })();

    // ── Start Button ─────────────────────────────────────────────────────────────
    document.getElementById('startBtn').addEventListener('click', () => {
      const username   = document.getElementById('usernameInput').value.trim()   || 'Jaan';
      const gfname     = document.getElementById('gfnameInput').value.trim()     || 'Sia';
      const gfnamefull = document.getElementById('gfnamefullInput').value.trim() || 'Sia Akter';
      const profilePic = avatarPreview.src.startsWith('data:')
        ? avatarPreview.src
        : null; // null = use default avatar in chat

      localStorage.setItem('siaai_user', JSON.stringify({
        username,
        gfname,
        gfnamefull,
        profilePic,
      }));

      // Clear old chat history when setting up fresh
      localStorage.removeItem('siaai_history');

      window.location.href = 'chat.html';
    });

    // Allow Enter key on last field to submit
    document.getElementById('gfnamefullInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('startBtn').click();
    });
  </script>
</body>
</html>
